name: Check Size

on:
  push:
    branches: [main, release-*]
  pull_request:
    branches: [main, release-*]

permissions:
  contents: read

jobs:
  check_size:
    name: Check Size
    timeout-minutes: 10
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      # Self-contained large-file guard. Replaces actionsdesk/lfs-warning, which
      # needed a write-scoped GITHUB_TOKEN and failed on every run with
      # "Resource not accessible by integration" under this repo's read-only
      # default token. This step only reads the tree, so it needs no extra
      # permissions and behaves identically on push and pull_request.
      - name: Check for large files
        env:
          FILE_SIZE_LIMIT: "524288" # 512 KiB
        run: |
          large=$(git ls-files | while read -r f; do
            size=$(git cat-file -s ":$f" 2>/dev/null || wc -c < "$f")
            if [ "${size:-0}" -gt "$FILE_SIZE_LIMIT" ]; then
              printf '%s bytes\t%s\n' "$size" "$f"
            fi
          done)
          if [ -n "$large" ]; then
            echo "::error::The following files exceed the ${FILE_SIZE_LIMIT}-byte limit; track them with Git LFS or remove them:"
            echo "$large"
            exit 1
          fi
          echo "No tracked file exceeds ${FILE_SIZE_LIMIT} bytes."
