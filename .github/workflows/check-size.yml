name: Check Size

on:
  push:
    branches: [main, release-*]
  pull_request:
    branches: [main, release-*]

jobs:
  check_size:
    name: Check Size
    timeout-minutes: 10
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          # Full history so lfs-warning can diff the PR against its base ref;
          # a shallow clone (fetch-depth: 1) makes the action error out.
          fetch-depth: 0

      - name: Check large files
        uses: actionsdesk/lfs-warning@v3.3
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          filesizelimit: "524288"
